name: daily
on:
  schedule:
    - cron: "0 14 * * *"        # 14:00 UTC daily (~1 h after BQ public dataset refresh)
  workflow_dispatch: {}         # manual trigger / first bootstrap
permissions:
  contents: write               # commit + release manage

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install DuckDB CLI
        env:
          DUCKDB_VERSION: v1.5.2
          DUCKDB_SHA256: 7b0130422ee15c4c07f85ab75c0e3daf19b912b762258d1724c30f27964fb021
        run: |
          curl -fsSLo duckdb.gz "https://github.com/duckdb/duckdb/releases/download/${DUCKDB_VERSION}/duckdb_cli-linux-amd64.gz"
          printf '%s  duckdb.gz\n' "${DUCKDB_SHA256}" | sha256sum -c -
          gunzip duckdb.gz
          chmod +x duckdb
          sudo mv duckdb /usr/local/bin/duckdb
          duckdb --version
      - name: Install deps
        run: bun install
      - name: Run pipeline (freshness-checked, no-op if BQ not yet refreshed)
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run start
        working-directory: pipeline
      - name: Commit data
        run: |
          git config user.name "hnpulse-bot"
          git config user.email "bot@hena.dev"
          git add web/public/data
          git diff --cached --quiet || git commit -m "chore(data): $(date -u +%Y-%m-%d) [skip ci]"
          git push
      - name: Build web
        run: bun run build
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Deploy static assets to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bunx wrangler@4.88.0 deploy
