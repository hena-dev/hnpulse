name: daily
on:
  schedule:
    - cron: "0 14 * * *"        # 14:00 UTC daily; HN API fills recent BQ lag
  workflow_dispatch:
    inputs:
      pipeline_now_utc:
        description: "Optional ISO timestamp for manual data repair/backfill"
        required: false
        type: string
permissions:
  contents: write               # commit + release manage

env:
  WRANGLER_VERSION: 4.99.0

concurrency:
  group: daily-publish
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - name: Install DuckDB CLI
        env:
          DUCKDB_VERSION: v1.5.2
          DUCKDB_SHA256: 7b0130422ee15c4c07f85ab75c0e3daf19b912b762258d1724c30f27964fb021
        run: |
          curl -fsSLo duckdb.gz "https://github.com/duckdb/duckdb/releases/download/${DUCKDB_VERSION}/duckdb_cli-linux-amd64.gz"
          printf '%s  duckdb.gz\n' "${DUCKDB_SHA256}" | sha256sum -c -
          gunzip duckdb.gz
          chmod +x duckdb
          sudo mv duckdb /usr/local/bin/duckdb
          duckdb --version
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Run pipeline (BQ + HN API, excludes today)
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PIPELINE_NOW: ${{ inputs.pipeline_now_utc }}
        run: bun run start
        working-directory: pipeline
      - name: Build web
        run: bun run build
      - name: Commit data
        run: |
          git config user.name "hnpulse-bot"
          git config user.email "bot@hena.dev"
          git add web/public/data
          git diff --cached --quiet || git commit -m "chore(data): $(date -u +%Y-%m-%d) [skip ci]"
          git push
      - name: Resolve deployment metadata
        id: deploy-meta
        run: |
          sha="$(git rev-parse HEAD)"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${sha}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Upload Cloudflare version
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DEPLOY_SHA: ${{ steps.deploy-meta.outputs.sha }}
          VERSION_TAG: ${{ steps.deploy-meta.outputs.version_tag }}
        run: >-
          bunx wrangler@${WRANGLER_VERSION} versions upload
          --tag "$VERSION_TAG"
          --message "Deploy $DEPLOY_SHA"
      - name: Deploy Cloudflare version
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          VERSION_TAG: ${{ steps.deploy-meta.outputs.version_tag }}
        run: >-
          bunx wrangler@${WRANGLER_VERSION} versions deploy
          --version-tag "$VERSION_TAG@100%"
          --yes
