name: deploy
on:
  workflow_dispatch:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]

permissions:
  contents: read

env:
  WRANGLER_VERSION: 4.99.0

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Resolve deployment metadata
        id: deploy-meta
        env:
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          echo "sha=${DEPLOY_SHA}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${DEPLOY_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
      - name: Upload Cloudflare version
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DEPLOY_SHA: ${{ steps.deploy-meta.outputs.sha }}
          VERSION_TAG: ${{ steps.deploy-meta.outputs.version_tag }}
        run: >-
          bunx wrangler@${WRANGLER_VERSION} versions upload
          --tag "$VERSION_TAG"
          --message "Deploy $DEPLOY_SHA"
      - name: Deploy Cloudflare version
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          VERSION_TAG: ${{ steps.deploy-meta.outputs.version_tag }}
        run: >-
          bunx wrangler@${WRANGLER_VERSION} versions deploy
          --version-tag "$VERSION_TAG@100%"
          --yes
