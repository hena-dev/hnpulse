name: pr-preview
on:
  pull_request:
permissions:
  contents: read
  pull-requests: write
  deployments: write

env:
  WRANGLER_VERSION: 4.99.0

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Resolve preview metadata
        id: preview-meta
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "version_tag=pr-${PR_NUMBER}-${HEAD_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
      - name: Upload preview version to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PR_NUMBER: ${{ steps.preview-meta.outputs.pr_number }}
          VERSION_TAG: ${{ steps.preview-meta.outputs.version_tag }}
        run: >-
          bunx wrangler@${WRANGLER_VERSION} versions upload
          --tag "$VERSION_TAG"
          --message "Preview PR #$PR_NUMBER"
